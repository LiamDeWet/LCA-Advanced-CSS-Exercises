<!doctype html>
<html lang="en">

    <title>Product Showcase</title>
    <link rel="stylesheet" href="week5_ex01_style.css" />

    <header>

        <p>R50.00</p>

      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300" alt="Product" />
        <h2>Product 5</h2>
        <p>R60.00</p>
        <button>Add to cart</button>

      <div class="card">

</html>
